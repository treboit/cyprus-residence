<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🇨🇾 Days in Cyprus Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="app-content">
        <div class="top-bar">
            <div class="lang-switch">
                <span id="lang-en" class="lang-toggle active" onclick="app.setLang('en')">🇬🇧 EN</span>
                <span id="lang-ru" class="lang-toggle" onclick="app.setLang('ru')">🇷🇺 РУ</span>
            </div>
        </div>

        <main class="container">
            <h1 id="txt-title">🇨🇾 Cyprus Citizenship Calculator</h1>
            <p id="txt-desc" class="subtitle"></p>
            
            <div class="disclaimer-box" id="txt-disc1"></div>

            <h2 class="block-title" id="txt-app">Application</h2>
            <div class="card app-card">
                <div class="law-box">
                    <h3 id="txt-law"></h3>
                    <p id="txt-lawDesc"></p>
                </div>

                <div class="inputs-row">
                    <div class="input-group editable">
                        <label id="lbl-langLevel"></label>
                        <select id="inp-level" onchange="app.calculate()"></select>
                    </div>
                    <div class="input-group editable">
                        <label id="lbl-firstReceipt"></label>
                        <input type="date" id="inp-receipt" onchange="app.calculate()">
                    </div>
                    <div class="input-group editable">
                        <label id="lbl-appDate"></label>
                        <input type="date" id="inp-app" onchange="app.calculate()">
                    </div>
                    <div class="input-group">
                        <label id="lbl-lawInterp">Law interpretation</label>
                        <div class="toggle-container">
                            <span id="lbl-latest">Latest</span>
                            <label class="switch">
                                <input type="checkbox" id="inp-strict" onchange="app.calculate()">
                                <span class="slider"></span>
                            </label>
                            <span id="lbl-strict">Strict</span>
                        </div>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="app-table">
                        <thead>
                            <tr>
                                <th id="th-period">Period</th>
                                <th id="th-absence" class="center-text">Absence days</th>
                                <th id="th-daysInCy" class="center-text">Days in Cyprus</th>
                                <th id="th-credited" class="center-text">Credited days</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="app-body"></tbody>
                        <tfoot>
                            <tr class="total-row">
                                <td id="th-total" style="text-align: left; font-weight: bold;">Total:</td>
                                <td id="tot-absence" class="center-text">0</td>
                                <td id="tot-cy" class="center-text">0</td>
                                <td id="tot-credit" class="center-text">0</td>
                                <td id="tot-status"></td>
                            </tr>
                        </tfoot>
                    </table>
                </div>
            </div>

            <h2 class="block-title" id="txt-trips">Trips</h2>
            <div class="card trips-card table-responsive">
                <table class="trips-table">
                    <thead>
                        <tr>
                            <th id="th-t-trip">Trip</th>
                            <th id="th-t-depDate">Departure date</th>
                            <th id="th-t-depPass">Passport №</th>
                            <th id="th-t-depStamp">Stamp page</th>
                            <th id="th-t-retDate">Return date</th>
                            <th id="th-t-retPass">Passport №</th>
                            <th id="th-t-retStamp">Stamp page</th>
                            <th id="th-t-daysAway" class="center-text">Days away</th>
                            <th></th> </tr>
                    </thead>
                    <tbody id="trips-body"></tbody>
                    <tfoot>
                        <tr>
                            <td colspan="9" style="text-align: center; vertical-align: middle; padding: 20px 0;">
                                <button class="btn-icon add-btn" onclick="app.addTrip()">+</button>
                            </td>
                        </tr>
                    </tfoot>
                </table>
            </div>

            <h2 class="block-title" id="txt-statement">Statement</h2>
            <div class="card statement-card">
                <p id="txt-stateInfo"></p>
                <div class="inputs-row" style="margin-bottom: 15px;">
                    <div class="input-group editable">
                        <label id="lbl-arc">ARC №</label>
                        <input type="text" id="inp-arc">
                    </div>
                    <div class="input-group editable">
                        <label id="lbl-name">Name and Surname</label>
                        <input type="text" id="inp-name">
                    </div>
                    <div class="input-group editable">
                        <label id="lbl-mp">MP (folder №)</label>
                        <input type="text" id="inp-mp">
                    </div>
                </div>
                <button class="btn btn-primary" id="btn-generate" onclick="app.generateStatements()">Generate statements</button>
            </div>

            <div class="footer-actions">
                <button class="btn btn-secondary" id="btn-save" onclick="app.saveCSV()">Save data</button>
                <label class="btn btn-secondary" style="cursor: pointer;">
                    <span id="btn-load">Load data</span>
                    <input type="file" id="inp-csv" accept=".csv" hidden onchange="app.loadCSV(this)">
                </label>
                <button class="btn btn-danger" id="btn-clear" onclick="app.clearAll()">Clear all</button>
            </div>

            <div class="disclaimer-box error" id="txt-disc2"></div>

            <div class="contact-block">
                <p id="contact-desc"></p>
                <div class="contact-buttons">
                    <a href="https://t.me/treboit" target="_blank" class="btn-outline btn-telegram">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.888-.667 3.473-1.513 5.789-2.511 6.948-2.997 3.3-1.387 3.985-1.627 4.43-1.63z"/></svg>
                        <span id="btn-contact-text"></span>
                    </a>
                    <a href="https://revolut.me/treboit" target="_blank" class="btn-outline btn-revolut">
                        <svg viewBox="0 0 800 800" width="20" height="20" fill="currentColor">
                            <g>
                                <rect x="209.051" y="262.097" width="101.445" height="410.21"/>
                                <path d="M628.623,285.554c0-87.043-70.882-157.86-158.011-157.86H209.051v87.603h249.125c39.43,0,72.093,30.978,72.814,69.051 c0.361,19.064-6.794,37.056-20.146,50.66c-13.357,13.61-31.204,21.109-50.251,21.109h-97.046c-3.446,0-6.25,2.8-6.25,6.245v77.859 c0,1.324,0.409,2.59,1.179,3.656l164.655,228.43h120.53L478.623,443.253C561.736,439.08,628.623,369.248,628.623,285.554z"/>
                            </g>
                        </svg>
                        <span id="btn-support-text"></span>
                    </a>
                </div>
            </div>
        </main>
    </div>

    <div id="print-area"></div>

    <script src="./config.js"></script>
    <script src="./logic.js"></script>
</body>
</html>
